<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>患者さばき</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root {
  --bg:        #F4EFE4;
  --surface:   #FDFAF2;
  --surface-2: #F7F1E3;
  --surface-3: #EFE7D4;
  --border:    #DDD3BC;
  --border-2:  #CFC4AB;
  --text:      #2A1D0E;
  --text-2:    #6E5E48;
  --text-3:    #9E8E78;
  --done:      #4E7A44;
  --stuck-fg:  #8A4040;
  --high:      #B07070;
  --shadow-xs: 0 1px 2px rgba(42,29,14,.06);
  --shadow-sm: 0 2px 6px rgba(42,29,14,.08), 0 1px 2px rgba(42,29,14,.05);
  --shadow:    0 4px 14px rgba(42,29,14,.10), 0 2px 4px rgba(42,29,14,.06);
  --shadow-lg: 0 8px 28px rgba(42,29,14,.13), 0 3px 8px rgba(42,29,14,.07);
  --r:   12px;
  --r-s:  8px;
  --r-xs: 6px;
  --font-sans: 'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN','Yu Gothic',system-ui,sans-serif;
  --font-serif:'Noto Serif JP','Yu Mincho',serif;
}

*, *::before, *::after { box-sizing: border-box; }
body {
  margin: 0;
  font-family: var(--font-sans);
  background-color: var(--bg);
  background-image:
    radial-gradient(circle at 1px 1px, rgba(42,29,14,.05) 1px, transparent 0);
  background-size: 20px 20px;
  min-height: 100vh;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* ── アニメーション ── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes toastIn {
  from { opacity:0; transform:translateX(-50%) translateY(14px) scale(.96); }
  to   { opacity:1; transform:translateX(-50%) translateY(0)    scale(1); }
}
@keyframes pulse-glow {
  0%,100% { box-shadow: 0 0 0 0 rgba(176,80,80,.45); }
  60%     { box-shadow: 0 0 0 5px rgba(176,80,80,.0); }
}
@keyframes checkPop {
  0%   { transform:scale(0); }
  60%  { transform:scale(1.25); }
  100% { transform:scale(1); }
}
@keyframes slideDown {
  from { opacity:0; transform:translateY(-6px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── カード ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  box-shadow: var(--shadow-sm);
  transition: box-shadow .2s ease, transform .2s ease;
  animation: fadeUp .22s ease both;
}
.card:hover { box-shadow: var(--shadow); }

/* ── ボタン ── */
.btn-dark {
  display:inline-flex; align-items:center; gap:6px;
  background: var(--text);
  color: var(--surface);
  border:none; border-radius: var(--r-s);
  padding: 10px 18px; font-size:13px; font-weight:600;
  font-family: var(--font-sans);
  letter-spacing:.02em; cursor:pointer;
  box-shadow: 0 2px 8px rgba(42,29,14,.28);
  transition: background .15s, box-shadow .15s, transform .12s;
}
.btn-dark:hover  { background:#3D2B14; box-shadow:0 4px 12px rgba(42,29,14,.32); transform:translateY(-1px); }
.btn-dark:active { transform:translateY(0); box-shadow:0 1px 4px rgba(42,29,14,.2); }

.btn-ghost {
  display:inline-flex; align-items:center; gap:6px;
  background: transparent;
  border: 1.5px solid var(--border);
  border-radius: var(--r-s);
  padding: 9px 14px; font-size:13px;
  color: var(--text); cursor:pointer;
  font-family: var(--font-sans);
  transition: background .15s, border-color .15s, transform .12s;
}
.btn-ghost:hover  { background:var(--surface-3); border-color:var(--border-2); transform:translateY(-1px); }
.btn-ghost:active { transform:translateY(0); }

.btn-ghost-active {
  background: var(--surface-3) !important;
  border-color: var(--border-2) !important;
}

.btn-green {
  display:inline-flex; align-items:center; gap:5px;
  background:#4E7A44; color:#fff;
  border:none; border-radius: var(--r-s);
  padding:9px 16px; font-size:13px; font-weight:600;
  font-family:var(--font-sans); cursor:pointer;
  box-shadow:0 2px 8px rgba(50,100,50,.22);
  transition: background .15s, box-shadow .15s, transform .12s;
}
.btn-green:hover  { background:#3E6A34; box-shadow:0 4px 12px rgba(50,100,50,.28); transform:translateY(-1px); }
.btn-green:active { transform:translateY(0); }

.btn-rose {
  display:inline-flex; align-items:center; gap:5px;
  background:transparent;
  border:1.5px solid #D4A8A8; border-radius:var(--r-s);
  padding:8px 14px; font-size:13px;
  color:#8A4040; cursor:pointer; font-family:var(--font-sans);
  transition: background .15s, transform .12s;
}
.btn-rose:hover  { background:#FBF0F0; transform:translateY(-1px); }
.btn-rose:active { transform:translateY(0); }

.btn-sm {
  display:inline-flex; align-items:center; gap:4px;
  background:transparent; border:none;
  font-size:11px; color:var(--text-3); cursor:pointer;
  font-family:var(--font-sans);
  padding:2px 4px; border-radius:4px;
  transition:color .12s, background .12s;
}
.btn-sm:hover { color:var(--text-2); background:var(--surface-3); }

/* ── インプット ── */
.inp {
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:var(--r-s);
  padding:10px 14px; font-size:13px;
  color:var(--text); width:100%;
  font-family:var(--font-sans);
  outline:none;
  transition:border-color .15s, box-shadow .15s;
}
.inp:focus { border-color:#C4A070; box-shadow:0 0 0 3px rgba(196,160,112,.18); }
.inp::placeholder { color:var(--text-3); }

/* ── チェックボックス ── */
.check-circle {
  width:20px; height:20px; border-radius:50%;
  border:2px solid var(--border-2);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; cursor:pointer;
  transition:border-color .15s, background .15s;
  background:transparent;
}
.check-circle:hover { border-color:#C4A070; }
.check-circle.done  {
  background:var(--done); border-color:var(--done);
  animation:checkPop .25s ease both;
}
.check-circle.stuck { border-color:var(--stuck-fg); }

/* ── タグ/バッジ ── */
.tag {
  display:inline-flex; align-items:center;
  font-size:11px; padding:2px 8px; border-radius:20px;
  font-weight:500; line-height:1.6; white-space:nowrap;
}
.time-tag {
  display:inline-flex; align-items:center; gap:4px;
  font-size:11px; padding:3px 8px; border-radius:20px;
  font-weight:600; font-family:monospace; white-space:nowrap;
}
.time-tag.past { animation:pulse-glow 2s ease infinite; }

/* ── 優先度バー ── */
.pri-high   { border-left:4px solid #C08080; }
.pri-normal { border-left:4px solid var(--border-2); }
.pri-low    { border-left:4px solid #90AE80; }

/* ── セクション区切り ── */
.task-list > li { border-bottom:1px solid #EAE2D0; }
.task-list > li:last-child { border-bottom:none; }

/* ── 提案カード ── */
.suggestion-card {
  border-radius:var(--r);
  box-shadow:var(--shadow);
  animation:slideDown .2s ease both;
}

/* ── トースト ── */
.toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:var(--text); color:var(--surface);
  padding:10px 22px; border-radius:24px; font-size:13px; font-weight:500;
  letter-spacing:.02em; white-space:nowrap;
  box-shadow:0 4px 20px rgba(42,29,14,.35);
  animation:toastIn .28s cubic-bezier(.34,1.56,.64,1) both;
  z-index:100;
}

/* ── ダイアログ ── */
.dialog-bg {
  position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
  padding:16px; z-index:50;
  background:rgba(42,29,14,.45);
  backdrop-filter:blur(4px);
}
.dialog {
  background:var(--surface); border-radius:16px;
  box-shadow:var(--shadow-lg);
  padding:24px; width:100%; max-width:480px;
  animation:fadeUp .2s ease both;
}

/* ── GASステータスバッジ ── */
.gas-badge {
  display:inline-flex; align-items:center; gap:4px;
  font-size:11px; font-weight:600;
  padding:3px 10px; border-radius:20px;
}

/* ── スクロールバー ── */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* ── 区切り線の削除 ── */
hr.fancy {
  border:none; height:1px;
  background: linear-gradient(to right, transparent, var(--border), transparent);
  margin:8px 0;
}

/* ── フォーカスモード特別スタイル ── */
.focus-card {
  background:var(--surface);
  border-radius:var(--r);
  box-shadow:var(--shadow-lg);
  padding:28px; border:1px solid var(--border);
  animation:fadeUp .25s ease both;
}

input[type="time"]::-webkit-calendar-picker-indicator { opacity:.5; }

/* ── セットチップ ── */
.set-chip {
  display:inline-flex; align-items:center; gap:3px;
  font-size:11px; padding:4px 10px; border-radius:20px;
  background:var(--surface-3); color:var(--text-2);
  border:1px solid var(--border); cursor:pointer;
  font-family:var(--font-sans); font-weight:500;
  transition:background .15s, border-color .15s, transform .12s;
}
.set-chip:hover { background:var(--surface-2); border-color:var(--border-2); transform:translateY(-1px); }
.set-chip:active { transform:translateY(0); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

// ── SVGアイコン ──────────────────────────────────────────────
const Icon = ({ d, size=16, color='currentColor', fill='none', strokeWidth=2, viewBox='0 0 24 24', extra }) => (
  <svg width={size} height={size} viewBox={viewBox} fill={fill} stroke={color}
    strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"
    style={{display:'inline-block',flexShrink:0,...extra}}>
    {Array.isArray(d) ? d.map((p,i)=><path key={i} d={p}/>) : <path d={d}/>}
  </svg>
);
const Plus          = p => <Icon {...p} d="M12 5v14M5 12h14"/>;
const X             = p => <Icon {...p} d="M18 6 6 18M6 6l12 12"/>;
const Check         = p => <Icon {...p} d="M20 6 9 17l-5-5"/>;
const Zap           = p => <Icon {...p} d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/>;
const Focus         = p => <Icon {...p} d={["M12 12m-3 0a3 3 0 1 0 6 0a3 3 0 1 0 -6 0","M3 7V5a2 2 0 0 1 2-2h2","M17 3h2a2 2 0 0 1 2 2v2","M21 17v2a2 2 0 0 1-2 2h-2","M7 21H5a2 2 0 0 1-2-2v-2"]}/>;
const Clock         = p => <Icon {...p} d={["M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z","M12 6v6l4 2"]}/>;
const Trash2        = p => <Icon {...p} d={["M3 6h18","M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6","M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2","M10 11v6","M14 11v6"]}/>;
const ChevronDown   = p => <Icon {...p} d="M6 9l6 6 6-6"/>;
const ChevronRight  = p => <Icon {...p} d="M9 18l6-6-6-6"/>;
const AlertCircle   = p => <Icon {...p} d={["M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z","M12 8v4","M12 16h.01"]}/>;
const Play          = p => <Icon {...p} d="M5 3l14 9-14 9V3z"/>;
const RotateCcw     = p => <Icon {...p} d={["M1 4v6h6","M3.51 15a9 9 0 1 0 .49-4.95"]}/>;
const Target        = p => <Icon {...p} d={["M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z","M12 6a6 6 0 1 0 0 12A6 6 0 0 0 12 6z","M12 10a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"]}/>;
const Coffee        = p => <Icon {...p} d={["M18 8h1a4 4 0 0 1 0 8h-1","M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z","M6 1v3","M10 1v3","M14 1v3"]}/>;
const AlertTriangle = p => <Icon {...p} d={["M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z","M12 9v4","M12 17h.01"]}/>;
const Pencil        = p => <Icon {...p} d={["M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7","M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"]}/>;
const Sparkles      = p => <Icon {...p} d={["M12 2l1.5 4.5L18 8l-4.5 1.5L12 14l-1.5-4.5L6 8l4.5-1.5L12 2z","M5 16l.9 2.1L8 19l-2.1.9L5 22l-.9-2.1L2 19l2.1-.9L5 16z","M19 1l.6 1.4L21 3l-1.4.6L19 5l-.6-1.4L17 3l1.4-.6L19 1z"]}/>;

// ── 定数 ─────────────────────────────────────────────────────
const TASK_TYPES = [
  { id:'order',     label:'指示',    dot:'#4A6B8A' },
  { id:'exam',      label:'診察',    dot:'#6B8E5A' },
  { id:'chart',     label:'カルテ',  dot:'#8B7355' },
  { id:'result',    label:'結果',    dot:'#8B5A8B' },
  { id:'family',    label:'IC/説明', dot:'#B87D7D' },
  { id:'consult',   label:'相談',    dot:'#B8925A' },
  { id:'discharge', label:'退院',    dot:'#5A8B8B' },
  { id:'other',     label:'その他',  dot:'#8B8B8B' },
];
const ESTIMATES = [
  { id:'2',  label:'2分'  },
  { id:'5',  label:'5分'  },
  { id:'15', label:'15分' },
  { id:'30', label:'30分+'},
];
const PRIORITIES = [
  { id:'high',   label:'高', color:'#C08080', bar:'#C08080',  cls:'pri-high'   },
  { id:'normal', label:'中', color:'#8B7355', bar:'#CFC4AB',  cls:'pri-normal' },
  { id:'low',    label:'低', color:'#6B8A5A', bar:'#A0B890',  cls:'pri-low'    },
];
const DEFAULT_TEMPLATES = [
  { id:'tpl-admission', name:'入院時セット', items:[
    { title:'入院部屋確保',     type:'other',   estimate:'2' },
    { title:'持参薬鑑別依頼',   type:'consult', estimate:'2' },
    { title:'持参薬処方',       type:'order',   estimate:'5' },
    { title:'入院時カルテ記述', type:'chart',   estimate:'5' },
    { title:'入院点滴入力',     type:'order',   estimate:'2' },
  ]},
  { id:'tpl-discharge', name:'退院セット', items:[
    { title:'退院処方入力',       type:'order',  estimate:'5'  },
    { title:'退院時サマリー記載', type:'chart',  estimate:'15' },
    { title:'栄養指導オーダー',   type:'order',  estimate:'2'  },
    { title:'次回外来予約',       type:'order',  estimate:'2'  },
    { title:'退院時患者指導',     type:'family', estimate:'15' },
  ]},
  { id:'tpl-preop', name:'オペ出し前セット', items:[
    { title:'術前同意書確認',       type:'chart', estimate:'2' },
    { title:'術前検査オーダー',     type:'order', estimate:'5' },
    { title:'NPO指示入力',          type:'order', estimate:'2' },
    { title:'術前点滴指示',         type:'order', estimate:'2' },
    { title:'予防的抗菌薬オーダー', type:'order', estimate:'2' },
  ]},
  { id:'tpl-emergency', name:'急変時セット', items:[
    { title:'ABGオーダー',    type:'order',   estimate:'2' },
    { title:'ポータブル胸写', type:'order',   estimate:'2' },
    { title:'12誘導心電図',   type:'order',   estimate:'2' },
    { title:'家族への連絡',   type:'family',  estimate:'5' },
    { title:'上級医への報告', type:'consult', estimate:'2' },
  ]},
];
const TIME_STATES = {
  past:     { bg:'#EDD0C8', fg:'#7A3020' },
  now:      { bg:'#F2D8A0', fg:'#7A4E10' },
  soon:     { bg:'#EDE4B4', fg:'#68500E' },
  upcoming: { bg:'#E4DCC8', fg:'#5A4E30' },
  future:   { bg:'#EAE6DA', fg:'#8A7A68' },
};
const STORAGE_KEY    = 'patient-triage-v1';
const GAS_CONFIG_KEY = 'patient-triage-gas-config';

// ── ユーティリティ ────────────────────────────────────────────
const uid      = () => Math.random().toString(36).slice(2,10);
const todayStr = () => new Date().toISOString().slice(0,10);
const getPri   = p  => p?.priority || 'normal';
const priMeta  = id => PRIORITIES.find(p=>p.id===id) || PRIORITIES[1];

const loadLocal = key => { try { const r=localStorage.getItem(key); return r?JSON.parse(r):null; } catch { return null; } };
const saveLocal = (key,val) => { try { localStorage.setItem(key,JSON.stringify(val)); } catch {} };
const loadGasConfig = () => loadLocal(GAS_CONFIG_KEY) || {url:'',secret:''};
const saveGasConfig = cfg => saveLocal(GAS_CONFIG_KEY, cfg);

function timeStatus(scheduledTime, nowMs) {
  if (!scheduledTime) return null;
  const [h,m] = scheduledTime.split(':').map(Number);
  if (isNaN(h)||isNaN(m)) return null;
  const sched = new Date(nowMs); sched.setHours(h,m,0,0);
  const d = (sched-nowMs)/60000;
  if (d<-5) return 'past'; if (d<5) return 'now'; if (d<30) return 'soon'; if (d<120) return 'upcoming';
  return 'future';
}

// GAS通信
async function gasFetch(cfg, payload) {
  await fetch(cfg.url, {
    method:'POST',
    body:JSON.stringify({secret:cfg.secret, data:payload}),
    headers:{'Content-Type':'text/plain'},
    mode:'no-cors',
  });
  return {ok:true};
}
function gasGet(cfg) {
  return new Promise((resolve,reject) => {
    const cbName = 'gasJsonpCb_'+Date.now();
    const script = document.createElement('script');
    const cleanup = () => { try{document.head.removeChild(script);}catch{} delete window[cbName]; };
    const timer = setTimeout(() => { cleanup(); reject(new Error('タイムアウト(10秒)')); }, 10000);
    window[cbName] = data => { clearTimeout(timer); cleanup(); resolve(data); };
    script.onerror = () => { clearTimeout(timer); cleanup(); reject(new Error('スクリプト読み込み失敗')); };
    script.src = `${cfg.url}?secret=${encodeURIComponent(cfg.secret)}&callback=${cbName}`;
    document.head.appendChild(script);
  });
}

// ── TimeBadge ─────────────────────────────────────────────────
function TimeBadge({scheduledTime, now, onClear, editable}) {
  if (!scheduledTime) return null;
  const ts = timeStatus(scheduledTime, now);
  const s  = TIME_STATES[ts] || TIME_STATES.future;
  return (
    <span className={`time-tag${ts==='past'?' past':''}`} style={{background:s.bg, color:s.fg}}>
      <Clock size={10} color={s.fg}/>
      {scheduledTime}
      {editable && onClear && (
        <button onClick={onClear} style={{background:'none',border:'none',padding:'0 0 0 2px',cursor:'pointer',lineHeight:1,opacity:.7}}>
          <X size={10} color={s.fg}/>
        </button>
      )}
    </span>
  );
}

// ── SuggestionCard ────────────────────────────────────────────
function SuggestionCard({suggestion, typeMeta, estMeta, now, onDone, onDoing, onStuck, onReroll, onDismiss}) {
  if (suggestion.empty) return (
    <div className="suggestion-card" style={{background:'var(--surface-2)',border:'1px solid var(--border)',padding:'20px',textAlign:'center',marginBottom:16}}>
      <Sparkles size={22} color="var(--text-3)" extra={{marginBottom:6,display:'block',margin:'0 auto 6px'}}/>
      <p style={{fontSize:13,color:'var(--text-2)',margin:'0 0 10px'}}>該当するタスクがありません。少し休憩しますか?</p>
      <button className="btn-sm" onClick={onDismiss} style={{fontSize:12}}>閉じる</button>
    </div>
  );
  const t    = suggestion.task;
  const type = typeMeta(t.type);
  const est  = estMeta(t.estimate);
  const pri  = priMeta(t.patientPriority);
  const accent = suggestion.fromStuck ? '#C08080' : 'var(--text)';
  return (
    <div className="suggestion-card" style={{
      background:'var(--surface)',
      border:`1px solid var(--border)`,
      borderLeft:`4px solid ${accent}`,
      padding:'18px 20px', marginBottom:16,
    }}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
        <div style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'var(--text-3)',fontWeight:600,letterSpacing:'.04em'}}>
          <Target size={13} color="var(--text-3)"/>
          {suggestion.fromStuck ? '詰まってたやつ — 小さな一歩だけ' : '次にやること'}
        </div>
        <button onClick={onDismiss} style={{background:'none',border:'none',cursor:'pointer',padding:4,opacity:.5,lineHeight:1}}>
          <X size={14} color="var(--text-2)"/>
        </button>
      </div>

      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8,flexWrap:'wrap'}}>
        <span style={{fontFamily:'monospace',fontSize:12,fontWeight:700,color:'var(--text-2)',letterSpacing:'.02em'}}>{t.patientName}</span>
        <span className="tag" style={{background:pri.color+'22',color:pri.color}}>優{pri.label}</span>
        <span className="tag" style={{background:type.dot+'20',color:type.dot}}>● {type.label}</span>
        <span style={{fontSize:11,color:'var(--text-3)'}}>{est.label}</span>
        <TimeBadge scheduledTime={t.scheduledTime} now={now}/>
      </div>

      <p style={{fontSize:16,fontWeight:600,color:'var(--text)',fontFamily:'var(--font-serif)',margin:'0 0 14px',lineHeight:1.5}}>{t.title}</p>

      {suggestion.fromStuck && t.tinyStep && (
        <div style={{background:'#F8EDE5',borderRadius:8,padding:'8px 12px',marginBottom:14,fontSize:13,color:'#7A4A3A'}}>
          <span style={{fontSize:11,opacity:.7}}>次の一歩: </span>{t.tinyStep}
        </div>
      )}

      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        <button className="btn-green" onClick={onDone}><Check size={14}/>完了</button>
        <button className="btn-ghost" onClick={onDoing}><Play size={13}/>やってる</button>
        <button className="btn-rose"  onClick={onStuck}><AlertCircle size={13}/>詰まった</button>
        <button className="btn-sm" onClick={onReroll} style={{marginLeft:'auto',opacity:.65,fontSize:12}}>
          <RotateCcw size={12}/>別のを
        </button>
      </div>
    </div>
  );
}

// ── TaskRow ───────────────────────────────────────────────────
function TaskRow({task, typeMeta, estMeta, now, onDone, onStuck, onDoing, onTodo, onUnstick, onRemove, onClearTime, onSetTime, muted}) {
  const {useState} = React;
  const type    = typeMeta(task.type);
  const est     = estMeta(task.estimate);
  const isStuck = task.status==='stuck';
  const isDoing = task.status==='doing';
  const isDone  = task.status==='done';
  const [editingTime, setEditingTime] = useState(false);
  const [hovered, setHovered] = useState(false);

  return (
    <li style={{padding:'10px 0',display:'flex',gap:10,alignItems:'flex-start',
      background:hovered&&!isDone?'rgba(42,29,14,.02)':'transparent',
      transition:'background .12s',borderRadius:6,margin:'0 -4px',padding:'10px 4px'}}
      onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)}>
      {/* チェックボックス */}
      <button
        onClick={isDone?onTodo:onDone}
        className={`check-circle${isDone?' done':isStuck?' stuck':''}`}
        style={{marginTop:1}}
        title={isDone?'クリックで未完に戻す':'完了にする'}>
        {isDone && <Check size={11} color="#fff"/>}
        {isDoing && !isDone && <span style={{width:7,height:7,borderRadius:'50%',background:'#8B7355',display:'block'}}/>}
      </button>

      <div style={{flex:1,minWidth:0}}>
        <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
          <span className="tag" style={{background:type.dot+'18',color:type.dot,fontSize:10}}>{type.label}</span>
          <span style={{
            fontSize:13, fontWeight:isDone?400:500,
            textDecoration:isDone?'line-through':'none',
            color:muted?'var(--text-3)':isStuck?'var(--stuck-fg)':'var(--text)',
            textDecorationColor:'var(--text-3)', lineHeight:1.4,
          }}>{task.title}</span>
          {task.scheduledTime && !editingTime && (
            <TimeBadge scheduledTime={task.scheduledTime} now={now} editable={!isDone&&!!onClearTime} onClear={onClearTime}/>
          )}
          <span style={{fontSize:11,color:'var(--text-3)',marginLeft:'auto',flexShrink:0}}>{est.label}</span>
        </div>

        {editingTime && onSetTime && (
          <div style={{marginTop:4}}>
            <input type="time" defaultValue={task.scheduledTime||''} autoFocus
              onChange={e=>{onSetTime(e.target.value);setEditingTime(false);}}
              onBlur={()=>setEditingTime(false)}
              className="inp" style={{width:'auto',fontSize:12,padding:'4px 8px'}}/>
          </div>
        )}

        {isStuck && (
          <div style={{marginTop:4,fontSize:11,color:'var(--stuck-fg)',background:'#FBF0F0',borderRadius:6,padding:'4px 8px'}}>
            {task.stuckReason && <div>詰まり: {task.stuckReason}</div>}
            {task.tinyStep    && <div style={{marginTop:2}}>→ 一歩: {task.tinyStep}</div>}
          </div>
        )}

        {!isDone && (
          <div style={{display:'flex',gap:10,marginTop:4,flexWrap:'wrap'}}>
            {!isStuck&&!isDoing && <button className="btn-sm" onClick={onDoing}>着手</button>}
            {isDoing           && <button className="btn-sm" onClick={onTodo}>中断</button>}
            {!isStuck ? <button className="btn-sm" onClick={onStuck}>詰まった</button>
                      : <button className="btn-sm" onClick={onUnstick} style={{color:'var(--stuck-fg)'}}>詰まり解除</button>}
            {!task.scheduledTime && onSetTime && (
              <button className="btn-sm" onClick={()=>setEditingTime(true)}>時刻設定</button>
            )}
            <button className="btn-sm" onClick={onRemove} style={{marginLeft:'auto',opacity:.6}}>削除</button>
          </div>
        )}
      </div>
    </li>
  );
}

// ── PatientCard ───────────────────────────────────────────────
function PatientCard({patient, expanded, onToggle, onRemove, onSetPriority, onRename,
  templates, onApplyTemplate, adding, onStartAdd, onCancelAdd, addForm, setAddForm, onAddTask,
  onTaskDone, onTaskStuck, onTaskDoing, onTaskTodo, onTaskRemove, onUnstick, onUpdateTask,
  typeMeta, estMeta, now}) {
  const {useState, useEffect} = React;
  const pri  = priMeta(getPri(patient));
  const open = patient.tasks.filter(t=>t.status!=='done');
  const done = patient.tasks.filter(t=>t.status==='done');
  const [editingName, setEditingName] = useState(false);
  const [draftName,   setDraftName]   = useState(patient.name);
  useEffect(()=>{ setDraftName(patient.name); },[patient.name]);

  const startEdit = e => { e.stopPropagation(); setDraftName(patient.name); setEditingName(true); };
  const commitName = () => {
    const n=draftName.trim();
    if (n&&n!==patient.name) onRename(n); else setDraftName(patient.name);
    setEditingName(false);
  };

  const sortedOpen = [...open].sort((a,b)=>{
    if (a.scheduledTime&&!b.scheduledTime) return -1;
    if (!a.scheduledTime&&b.scheduledTime) return 1;
    if (a.scheduledTime&&b.scheduledTime) return a.scheduledTime.localeCompare(b.scheduledTime);
    return (a.createdAt||0)-(b.createdAt||0);
  });

  const allDone = open.length===0 && patient.tasks.length>0;

  return (
    <div className={`card ${pri.cls}`} style={{overflow:'hidden'}}>
      {/* ヘッダー */}
      <div onClick={onToggle} style={{
        display:'flex', alignItems:'center', padding:'12px 14px',
        cursor:'pointer', userSelect:'none', gap:8,
        background: allDone ? 'rgba(78,122,68,.05)' : 'transparent',
        transition:'background .15s',
      }}>
        <span style={{color:'var(--text-3)',lineHeight:1,flexShrink:0}}>
          {expanded ? <ChevronDown size={16}/> : <ChevronRight size={16}/>}
        </span>

        {/* 患者名 */}
        {editingName ? (
          <input autoFocus value={draftName}
            onChange={e=>setDraftName(e.target.value)}
            onClick={e=>e.stopPropagation()}
            onKeyDown={e=>{if(e.key==='Enter')commitName();if(e.key==='Escape'){setDraftName(patient.name);setEditingName(false);}}}
            onBlur={commitName}
            className="inp" style={{width:'auto',minWidth:'6rem',maxWidth:'12rem',padding:'4px 8px',fontSize:14,fontWeight:700,fontFamily:'monospace'}}/>
        ) : (
          <div style={{display:'flex',alignItems:'center',gap:4}}>
            <span style={{fontFamily:'monospace',fontWeight:700,fontSize:14,color:'var(--text)',letterSpacing:'.02em'}}
              onDoubleClick={startEdit} title="ダブルクリックで名前変更">
              {patient.name}
            </span>
            <button onClick={startEdit} title="符丁を変更"
              style={{background:'none',border:'none',cursor:'pointer',padding:3,opacity:.4,lineHeight:1,transition:'opacity .12s'}}
              onMouseEnter={e=>e.currentTarget.style.opacity=1} onMouseLeave={e=>e.currentTarget.style.opacity=.4}>
              <Pencil size={12} color="var(--text-2)"/>
            </button>
          </div>
        )}

        {/* 優先度ボタン */}
        <div style={{display:'flex',gap:3}} onClick={e=>e.stopPropagation()}>
          {PRIORITIES.map(p=>(
            <button key={p.id} onClick={()=>onSetPriority(p.id)}
              title={`優先度: ${p.label}`}
              style={{
                width:20,height:20,borderRadius:6,border:'none',cursor:'pointer',
                fontSize:10,fontWeight:700,
                background:getPri(patient)===p.id?p.color:'var(--surface-3)',
                color:getPri(patient)===p.id?'#fff':p.color,
                transition:'all .12s',
              }}>
              {p.label}
            </button>
          ))}
        </div>

        {/* 件数 */}
        <span style={{fontSize:11,color:allDone?'var(--done)':'var(--text-3)',marginLeft:4}}>
          {allDone ? '✓ 完了' : `未 ${open.length}`}
          {done.length>0&&open.length>0&&` / 済 ${done.length}`}
        </span>

        {/* 削除 */}
        <button onClick={e=>{e.stopPropagation();onRemove();}}
          style={{marginLeft:'auto',background:'none',border:'none',cursor:'pointer',padding:4,opacity:.35,lineHeight:1,transition:'opacity .12s'}}
          onMouseEnter={e=>e.currentTarget.style.opacity=.8} onMouseLeave={e=>e.currentTarget.style.opacity=.35}>
          <Trash2 size={14} color="#C08080"/>
        </button>
      </div>

      {/* 展開部分 */}
      {expanded && (
        <div style={{padding:'0 14px 14px',borderTop:'1px solid var(--border)'}}>
          {patient.tasks.length===0&&!adding && (
            <p style={{textAlign:'center',padding:'16px 0',fontSize:12,color:'var(--text-3)'}}>タスクなし</p>
          )}

          <ul className="task-list" style={{listStyle:'none',margin:0,padding:0}}>
            {sortedOpen.map(t=>(
              <TaskRow key={t.id} task={t} typeMeta={typeMeta} estMeta={estMeta} now={now}
                onDone={()=>onTaskDone(t.id)} onStuck={()=>onTaskStuck(t.id)}
                onDoing={()=>onTaskDoing(t.id)} onTodo={()=>onTaskTodo(t.id)}
                onUnstick={()=>onUnstick(t.id)} onRemove={()=>onTaskRemove(t.id)}
                onClearTime={()=>onUpdateTask(t.id,{scheduledTime:null})}
                onSetTime={time=>onUpdateTask(t.id,{scheduledTime:time||null})}/>
            ))}
            {done.map(t=>(
              <TaskRow key={t.id} task={t} typeMeta={typeMeta} estMeta={estMeta} now={now}
                onRemove={()=>onTaskRemove(t.id)} onTodo={()=>onTaskTodo(t.id)} muted/>
            ))}
          </ul>

          {/* タスク追加フォーム */}
          {adding ? (
            <div style={{marginTop:10,background:'var(--surface-2)',borderRadius:10,padding:12}}>
              <input autoFocus value={addForm.title}
                onChange={e=>setAddForm({...addForm,title:e.target.value})}
                onKeyDown={e=>{if(e.key==='Enter')onAddTask();if(e.key==='Escape')onCancelAdd();}}
                placeholder="タスク内容 (Enterで追加)"
                className="inp" style={{marginBottom:8}}/>
              <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:8}}>
                {TASK_TYPES.map(tt=>(
                  <button key={tt.id} onClick={()=>setAddForm({...addForm,type:tt.id})}
                    className="tag" style={{
                      background:addForm.type===tt.id?tt.dot:'var(--surface)',
                      color:addForm.type===tt.id?'#fff':tt.dot,
                      border:`1px solid ${tt.dot}50`,cursor:'pointer',fontSize:11,padding:'3px 9px',
                      transition:'all .12s',
                    }}>
                    {tt.label}
                  </button>
                ))}
              </div>
              <div style={{display:'flex',flexWrap:'wrap',gap:4,alignItems:'center'}}>
                {ESTIMATES.map(e=>(
                  <button key={e.id} onClick={()=>setAddForm({...addForm,estimate:e.id})}
                    className="tag" style={{
                      background:addForm.estimate===e.id?'var(--text)':'var(--surface)',
                      color:addForm.estimate===e.id?'var(--surface)':'var(--text-2)',
                      border:'1px solid var(--border)',cursor:'pointer',fontSize:11,padding:'3px 9px',
                      transition:'all .12s',
                    }}>
                    {e.label}
                  </button>
                ))}
                <div style={{display:'flex',alignItems:'center',gap:4,marginLeft:4}}>
                  <Clock size={12} color="var(--text-3)"/>
                  <input type="time" value={addForm.scheduledTime||''}
                    onChange={e=>setAddForm({...addForm,scheduledTime:e.target.value})}
                    className="inp" style={{width:'auto',padding:'3px 8px',fontSize:12}}/>
                  {addForm.scheduledTime&&(
                    <button onClick={()=>setAddForm({...addForm,scheduledTime:''})}
                      style={{background:'none',border:'none',cursor:'pointer',padding:2,opacity:.6,lineHeight:1}}>
                      <X size={12} color="var(--text-2)"/>
                    </button>
                  )}
                </div>
                <div style={{marginLeft:'auto',display:'flex',gap:6}}>
                  <button className="btn-sm" onClick={onCancelAdd}>キャンセル</button>
                  <button className="btn-dark" onClick={onAddTask} style={{padding:'6px 14px',fontSize:12}}>追加</button>
                </div>
              </div>
            </div>
          ) : (
            <button onClick={onStartAdd} style={{
              marginTop:8,width:'100%',padding:'8px',fontSize:12,
              background:'transparent',border:'1.5px dashed var(--border)',
              borderRadius:8,cursor:'pointer',color:'var(--text-3)',
              display:'flex',alignItems:'center',justifyContent:'center',gap:4,
              transition:'border-color .12s,color .12s',fontFamily:'var(--font-sans)',
            }}
            onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--border-2)';e.currentTarget.style.color='var(--text-2)';}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--text-3)';}}>
              <Plus size={13}/>タスクを追加
            </button>
          )}

          {/* テンプレートチップ */}
          {templates&&templates.length>0&&!adding&&(
            <div style={{display:'flex',alignItems:'center',gap:6,marginTop:8,flexWrap:'wrap'}}>
              <span style={{fontSize:11,color:'var(--text-3)'}}>セット:</span>
              {templates.map(tpl=>(
                <button key={tpl.id} className="set-chip" onClick={()=>onApplyTemplate(tpl)}
                  title={`${tpl.items.length}件のタスクを一括追加`}>
                  + {tpl.name}
                  <span style={{opacity:.5,fontSize:10}}>({tpl.items.length})</span>
                </button>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── FocusView ─────────────────────────────────────────────────
function FocusView({patients, typeMeta, estMeta, now, onComplete, onStuck, onDoing, onUnstick}) {
  const allOpen = patients.flatMap(p=>
    p.tasks.filter(t=>t.status!=='done').map(t=>({...t,patientId:p.id,patientName:p.name,patientPriority:getPri(p)}))
  );
  const score = t=>{
    if (t.status==='doing') return 1000;
    const ts=timeStatus(t.scheduledTime,now);
    if(ts==='past')return 900;if(ts==='now')return 800;if(ts==='soon')return 600;
    const pri=t.patientPriority==='high'?100:t.patientPriority==='low'?10:50;
    if(ts==='upcoming')return 300+pri;
    return pri;
  };
  const current = [...allOpen].sort((a,b)=>score(b)-score(a))[0];
  if (!current) return (
    <div className="focus-card" style={{textAlign:'center'}}>
      <div style={{fontSize:32,marginBottom:12}}>🌿</div>
      <p style={{fontSize:16,color:'var(--text-2)',fontFamily:'var(--font-serif)'}}>すべて完了 — 深呼吸しましょう</p>
    </div>
  );
  const type = typeMeta(current.type);
  const est  = estMeta(current.estimate);
  const pri  = priMeta(current.patientPriority);
  return (
    <div className="focus-card">
      <p style={{fontSize:11,color:'var(--text-3)',marginBottom:14,fontWeight:600,letterSpacing:'.06em'}}>今だけこれ見てればOK</p>
      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:10,flexWrap:'wrap'}}>
        <span style={{fontFamily:'monospace',fontWeight:700,fontSize:13,color:'var(--text-2)'}}>{current.patientName}</span>
        <span className="tag" style={{background:pri.color+'22',color:pri.color}}>優{pri.label}</span>
        <span className="tag" style={{background:type.dot+'20',color:type.dot}}>{type.label}</span>
        <span style={{fontSize:11,color:'var(--text-3)'}}>{est.label}</span>
        <TimeBadge scheduledTime={current.scheduledTime} now={now}/>
      </div>
      <p style={{fontSize:22,fontWeight:600,fontFamily:'var(--font-serif)',color:current.status==='stuck'?'var(--stuck-fg)':'var(--text)',lineHeight:1.4,marginBottom:18}}>{current.title}</p>
      {current.status==='stuck'&&current.tinyStep&&(
        <div style={{background:'#F8EDE5',borderRadius:8,padding:'10px 14px',marginBottom:18,color:'#7A4A3A',fontSize:13}}>
          <div style={{fontSize:11,opacity:.7,marginBottom:4}}>小さな一歩:</div>
          {current.tinyStep}
        </div>
      )}
      <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
        <button className="btn-green" onClick={()=>onComplete(current.patientId,current.id)}><Check size={15}/>完了</button>
        {current.status!=='doing'&&current.status!=='stuck'&&(
          <button className="btn-ghost" onClick={()=>onDoing(current.patientId,current.id)}><Play size={14}/>着手</button>
        )}
        {current.status!=='stuck'&&(
          <button className="btn-rose" onClick={()=>onStuck(current.patientId,current.id)}><AlertCircle size={14}/>詰まった</button>
        )}
        {current.status==='stuck'&&(
          <button className="btn-ghost" onClick={()=>onUnstick(current.patientId,current.id)}>詰まり解除</button>
        )}
      </div>
    </div>
  );
}

// ── GasConfigDialog ───────────────────────────────────────────

// ── ImportDialog ──────────────────────────────────────────────
function ImportDialog({text, setText, onImportText, onImportFile, onCancel}) {
  return (
    <div className="dialog-bg" onClick={onCancel}>
      <div className="dialog" onClick={e=>e.stopPropagation()}>
        <h3 style={{fontFamily:'var(--font-serif)',fontSize:16,fontWeight:700,color:'var(--text)',margin:'0 0 6px'}}>データインポート</h3>
        <p style={{fontSize:12,color:'var(--text-3)',margin:'0 0 14px'}}>JSONファイルを選択するか、テキストを貼り付けてください。</p>
        <label style={{display:'block',marginBottom:12,padding:'12px',borderRadius:8,border:'1.5px dashed var(--border)',cursor:'pointer',textAlign:'center',fontSize:12,color:'var(--text-3)',transition:'border-color .12s'}}
          onMouseEnter={e=>e.currentTarget.style.borderColor='var(--border-2)'}
          onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>
          <input type="file" accept=".json,application/json" style={{display:'none'}}
            onChange={e=>{const f=e.target.files?.[0];if(f)onImportFile(f);}}/>
          📁 ファイルを選択
        </label>
        <label style={{fontSize:12,color:'var(--text-2)',fontWeight:600,display:'block',marginBottom:4}}>または JSONテキストを貼り付け:</label>
        <textarea value={text} onChange={e=>setText(e.target.value)}
          placeholder='{"patients": [...], "stats": {...}}'
          rows={5} className="inp" style={{resize:'none',fontFamily:'monospace',fontSize:11,marginBottom:14}}/>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button className="btn-sm" onClick={onCancel} style={{fontSize:13}}>キャンセル</button>
          <button className="btn-dark" onClick={onImportText} disabled={!text.trim()} style={{opacity:!text.trim()?.4:1}}>読み込む</button>
        </div>
      </div>
    </div>
  );
}

// ── TemplatesSection ──────────────────────────────────────────
function TemplatesSection({templates, onAddTemplate, onUpdateTemplate, onDeleteTemplate, onAddItem, onUpdateItem, onRemoveItem}) {
  const inpStyle = {background:'var(--surface)',border:'1px solid var(--border)',borderRadius:6,padding:'4px 8px',fontSize:12,color:'var(--text)',fontFamily:'var(--font-sans)',outline:'none'};
  return (
    <div style={{marginTop:8,background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:14,fontSize:12}}>
      <p style={{color:'var(--text-3)',marginBottom:10,lineHeight:1.6}}>よく使うタスクセットを定義しておくと、患者カードの「セット:」から一発追加できます。</p>
      {templates.length===0&&<p style={{color:'var(--text-3)',padding:'8px 0'}}>テンプレートはありません</p>}
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {templates.map(tpl=>(
          <div key={tpl.id} style={{background:'var(--surface-2)',borderRadius:8,padding:10}}>
            <div style={{display:'flex',gap:6,marginBottom:8,alignItems:'center'}}>
              <input value={tpl.name} onChange={e=>onUpdateTemplate(tpl.id,{name:e.target.value})}
                style={{...inpStyle,flex:1,fontSize:13,fontWeight:600}}/>
              <button onClick={()=>onDeleteTemplate(tpl.id)} className="btn-sm" style={{color:'#C08080'}}>削除</button>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:4}}>
              {tpl.items.map((item,idx)=>(
                <div key={idx} style={{display:'flex',gap:4,alignItems:'center'}}>
                  <input value={item.title} onChange={e=>onUpdateItem(tpl.id,idx,{title:e.target.value})}
                    placeholder="タスク名" style={{...inpStyle,flex:1,minWidth:0}}/>
                  <select value={item.type||'other'} onChange={e=>onUpdateItem(tpl.id,idx,{type:e.target.value})} style={{...inpStyle,flexShrink:0}}>
                    {TASK_TYPES.map(tt=><option key={tt.id} value={tt.id}>{tt.label}</option>)}
                  </select>
                  <select value={item.estimate||'5'} onChange={e=>onUpdateItem(tpl.id,idx,{estimate:e.target.value})} style={{...inpStyle,flexShrink:0}}>
                    {ESTIMATES.map(es=><option key={es.id} value={es.id}>{es.label}</option>)}
                  </select>
                  <button onClick={()=>onRemoveItem(tpl.id,idx)} style={{background:'none',border:'none',cursor:'pointer',padding:3,opacity:.5,lineHeight:1}}>
                    <X size={13} color="#C08080"/>
                  </button>
                </div>
              ))}
            </div>
            <button className="btn-sm" onClick={()=>onAddItem(tpl.id)} style={{marginTop:6}}>+ アイテム追加</button>
          </div>
        ))}
      </div>
      <button className="btn-ghost" onClick={onAddTemplate}
        style={{marginTop:10,width:'100%',justifyContent:'center',fontSize:12,padding:'8px 14px'}}>
        <Plus size={13}/>新規テンプレート
      </button>
    </div>
  );
}

// ── メインコンポーネント ──────────────────────────────────────
function PatientTriage() {
  const {useState, useEffect, useMemo} = React;

  const [patients,         setPatients]         = useState([]);
  const [loaded,           setLoaded]           = useState(false);
  const [expandedPatients, setExpandedPatients] = useState({});
  const [newPatientName,   setNewPatientName]   = useState('');
  const [newPatientPri,    setNewPatientPri]    = useState('normal');
  const [adding,           setAdding]           = useState({});
  const [addForm,          setAddForm]          = useState({});
  const [suggestion,       setSuggestion]       = useState(null);
  const [focusMode,        setFocusMode]        = useState(false);
  const [quickOnly,        setQuickOnly]        = useState(false);
  const [stuckDialog,      setStuckDialog]      = useState(null);
  const [stuckForm,        setStuckForm]        = useState({reason:'',tinyStep:''});
  const [stats,            setStats]            = useState({doneToday:0,date:todayStr()});
  const [now,              setNow]              = useState(Date.now());
  const [importDialog,     setImportDialog]     = useState(false);
  const [importText,       setImportText]       = useState('');
  const [dataToolsOpen,    setDataToolsOpen]    = useState(false);
  const [templatesOpen,    setTemplatesOpen]    = useState(false);
  const [templates,        setTemplates]        = useState([]);
  const [toast,            setToast]            = useState(null);
  const [gasConfig,        setGasConfigState]   = useState(()=>loadGasConfig());
  const [gasStatus,        setGasStatus]        = useState('idle');
  const [gasDialog,        setGasDialog]        = useState(false);

  useEffect(()=>{ const id=setInterval(()=>setNow(Date.now()),60000); return ()=>clearInterval(id); },[]);

  useEffect(()=>{
    const parsed=loadLocal(STORAGE_KEY);
    if (parsed) {
      setPatients(parsed.patients||[]);
      if (parsed.stats?.date===todayStr()) setStats(parsed.stats);
      setTemplates(Array.isArray(parsed.templates)?parsed.templates:DEFAULT_TEMPLATES);
    } else { setTemplates(DEFAULT_TEMPLATES); }
    setLoaded(true);
  },[]);

  useEffect(()=>{
    if (!loaded) return;
    saveLocal(STORAGE_KEY,{patients,stats,templates});
  },[patients,stats,templates,loaded]);

  // derived
  const sortedPatients = useMemo(()=>{
    const order={high:0,normal:1,low:2};
    return [...patients].sort((a,b)=>{
      const pa=order[getPri(a)],pb=order[getPri(b)];
      return pa!==pb?pa-pb:(a.createdAt||0)-(b.createdAt||0);
    });
  },[patients]);

  const flatTasks = useMemo(()=>
    patients.flatMap(p=>p.tasks.map(t=>({...t,patientId:p.id,patientName:p.name,patientPriority:getPri(p)}))),
    [patients]);
  const stuckTasks    = useMemo(()=>flatTasks.filter(t=>t.status==='stuck'),     [flatTasks]);
  const openTaskCount = useMemo(()=>flatTasks.filter(t=>t.status!=='done').length,[flatTasks]);
  const timedAlerts   = useMemo(()=>{
    return flatTasks.filter(t=>t.status!=='done'&&t.scheduledTime)
      .map(t=>({...t,ts:timeStatus(t.scheduledTime,now)}))
      .filter(t=>t.ts==='past'||t.ts==='now'||t.ts==='soon')
      .sort((a,b)=>(a.scheduledTime||'').localeCompare(b.scheduledTime||''));
  },[flatTasks,now]);

  // patient ops
  const addPatient = () => {
    const name=newPatientName.trim(); if(!name) return;
    const p={id:uid(),name,priority:newPatientPri,tasks:[],createdAt:Date.now()};
    setPatients(prev=>[...prev,p]);
    setExpandedPatients(prev=>({...prev,[p.id]:true}));
    setNewPatientName(''); setNewPatientPri('normal');
  };
  const removePatient      = id  => setPatients(prev=>prev.filter(p=>p.id!==id));
  const setPatientPriority = (id,priority) => setPatients(prev=>prev.map(p=>p.id===id?{...p,priority}:p));
  const renamePatient      = (id,name) => { const t=name.trim(); if(t) setPatients(prev=>prev.map(p=>p.id===id?{...p,name:t}:p)); };
  const toggleExpand       = id  => setExpandedPatients(prev=>({...prev,[id]:!prev[id]}));

  // task ops
  const addTask = patientId => {
    const form=addForm[patientId]||{};
    const title=(form.title||'').trim(); if(!title) return;
    const task={id:uid(),title,type:form.type||'other',estimate:form.estimate||'5',
      scheduledTime:form.scheduledTime||null,status:'todo',stuckReason:'',tinyStep:'',createdAt:Date.now()};
    setPatients(prev=>prev.map(p=>p.id===patientId?{...p,tasks:[...p.tasks,task]}:p));
    setAddForm(prev=>({...prev,[patientId]:{...form,title:'',scheduledTime:''}}));
  };
  const updateTask = (patientId,taskId,updates) =>
    setPatients(prev=>prev.map(p=>p.id===patientId?{...p,tasks:p.tasks.map(t=>t.id===taskId?{...t,...updates}:t)}:p));
  const completeTask = (patientId,taskId) => {
    updateTask(patientId,taskId,{status:'done',completedAt:Date.now()});
    setStats(prev=>({...prev,doneToday:prev.doneToday+1,date:todayStr()}));
    if(suggestion?.task?.id===taskId) setSuggestion(null);
  };
  const removeTask = (patientId,taskId) => {
    setPatients(prev=>prev.map(p=>p.id===patientId?{...p,tasks:p.tasks.filter(t=>t.id!==taskId)}:p));
    if(suggestion?.task?.id===taskId) setSuggestion(null);
  };
  const markStuck = (patientId,taskId) => {
    const task=patients.find(p=>p.id===patientId)?.tasks.find(t=>t.id===taskId);
    setStuckForm({reason:task?.stuckReason||'',tinyStep:task?.tinyStep||''});
    setStuckDialog({patientId,taskId});
  };
  const saveStuck = () => {
    if(!stuckDialog) return;
    updateTask(stuckDialog.patientId,stuckDialog.taskId,{status:'stuck',stuckReason:stuckForm.reason,tinyStep:stuckForm.tinyStep});
    setStuckDialog(null); setStuckForm({reason:'',tinyStep:''});
  };
  const unstick = (patientId,taskId) => updateTask(patientId,taskId,{status:'todo'});

  // suggest
  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(null),2500); };
  const suggestNext = () => {
    let pool=flatTasks.filter(t=>t.status==='todo'||t.status==='doing');
    if(quickOnly){
      const quick=pool.filter(t=>t.estimate==='2');
      pool = quick.length>0 ? quick : pool;
    }
    if(!pool.length){setSuggestion({empty:true});return;}
    const weights=pool.map(t=>{
      const estW={'2':1.6,'5':1.2,'15':1.0,'30':0.7}[t.estimate]||1;
      const stateW=t.status==='doing'?1.8:1.0;
      const priW=t.patientPriority==='high'?2.2:t.patientPriority==='low'?0.55:1.0;
      const ts=timeStatus(t.scheduledTime,now);
      const schedW=ts==='past'?3.5:ts==='now'?3.0:ts==='soon'?2.2:ts==='upcoming'?1.4:1.0;
      return estW*stateW*priW*schedW;
    });
    const total=weights.reduce((a,b)=>a+b,0);
    let r=Math.random()*total, pick=pool[pool.length-1];
    for(let i=0;i<pool.length;i++){r-=weights[i];if(r<=0){pick=pool[i];break;}}
    setSuggestion({task:pick});
  };
  const suggestFromStuck = () => {
    if(!stuckTasks.length) return;
    setSuggestion({task:stuckTasks[Math.floor(Math.random()*stuckTasks.length)],fromStuck:true});
  };

  // templates
  const applyTemplate = (patientId,template) => {
    const newTasks=template.items.filter(i=>i.title?.trim()).map(i=>({
      id:uid(),title:i.title.trim(),type:i.type||'other',estimate:i.estimate||'5',
      scheduledTime:null,status:'todo',stuckReason:'',tinyStep:'',createdAt:Date.now()
    }));
    if(!newTasks.length){showToast('テンプレートが空です');return;}
    setPatients(prev=>prev.map(p=>p.id===patientId?{...p,tasks:[...p.tasks,...newTasks]}:p));
    setExpandedPatients(prev=>({...prev,[patientId]:true}));
    showToast(`「${template.name}」${newTasks.length}件追加`);
  };
  const updateTemplate     = (id,updates)  => setTemplates(prev=>prev.map(t=>t.id===id?{...t,...updates}:t));
  const deleteTemplate     = id            => { if(window.confirm('このテンプレートを削除しますか?')) setTemplates(prev=>prev.filter(t=>t.id!==id)); };
  const addTemplate        = ()            => { const name=window.prompt('新しいセットの名前:',''); if(name?.trim()) setTemplates(prev=>[...prev,{id:uid(),name:name.trim(),items:[]}]); };
  const addTemplateItem    = tid           => setTemplates(prev=>prev.map(t=>t.id===tid?{...t,items:[...t.items,{title:'',type:'other',estimate:'5'}]}:t));
  const updateTemplateItem = (tid,idx,upd) => setTemplates(prev=>prev.map(t=>t.id===tid?{...t,items:t.items.map((it,i)=>i===idx?{...it,...upd}:it)}:t));
  const removeTemplateItem = (tid,idx)     => setTemplates(prev=>prev.map(t=>t.id===tid?{...t,items:t.items.filter((_,i)=>i!==idx)}:t));

  // GAS
  const setGasConfig = cfg => { setGasConfigState(cfg); saveGasConfig(cfg); };
  const buildPayload = ()  => ({patients,stats,templates,version:1});
  const applyPayload = parsed => {
    if(!parsed||!Array.isArray(parsed.patients)) return false;
    setPatients(parsed.patients);
    if(parsed.stats?.date===todayStr()) setStats(parsed.stats);
    if(Array.isArray(parsed.templates)) setTemplates(parsed.templates);
    return true;
  };
  const gasPush = async () => {
    if(!gasConfig.url||!gasConfig.secret){showToast('GAS URLとシークレットを設定してください');return;}
    setGasStatus('syncing');
    try{const r=await gasFetch(gasConfig,buildPayload());if(r.ok){setGasStatus('ok');showToast('GASに保存しました ✓');}else throw new Error(r.error||'unknown');}
    catch(e){setGasStatus('error');showToast('GAS保存失敗: '+e.message);}
  };
  const gasPull = async () => {
    if(!gasConfig.url||!gasConfig.secret){showToast('GAS URLとシークレットを設定してください');return;}
    setGasStatus('syncing');
    try{
      const r=await gasGet(gasConfig);
      if(!r.ok) throw new Error(r.error||'unknown');
      if(!r.data){setGasStatus('ok');showToast('GASにデータがまだありません');return;}
      const count=r.data.patients?.length??0;
      const open=(r.data.patients||[]).reduce((s,p)=>s+(p.tasks||[]).filter(t=>t.status!=='done').length,0);
      if(!window.confirm(`GASから読み込む: 患者${count}人 / 未完タスク${open}件\n現在のデータは上書きされます。続行しますか?`)){setGasStatus('idle');return;}
      applyPayload(r.data);setGasStatus('ok');showToast('GASから読み込みました ✓');
    }catch(e){setGasStatus('error');showToast('GAS読み込み失敗: '+e.message);}
  };
  useEffect(()=>{
    if(!loaded||!gasConfig.url||!gasConfig.secret) return;
    const t=setTimeout(()=>gasFetch(gasConfig,buildPayload()).catch(()=>{}),3000);
    return ()=>clearTimeout(t);
  },[patients,stats,templates,loaded]);

  // export/import
  const buildExportJSON = () => JSON.stringify({patients,stats,templates,version:1,exportedAt:new Date().toISOString()},null,2);
  const exportToFile = () => {
    const blob=new Blob([buildExportJSON()],{type:'application/json'});
    const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:`patient-triage-${new Date().toISOString().replace(/[:.]/g,'-').slice(0,19)}.json`});
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);
    showToast('ファイル保存しました');
  };
  const exportToClipboard = async () => {
    const json=buildExportJSON();
    try{await navigator.clipboard.writeText(json);showToast('クリップボードにコピー');}
    catch{setImportText(json);setImportDialog(true);}
  };
  const runImport = jsonString => {
    let parsed;
    try{parsed=JSON.parse(jsonString);}catch(e){alert('JSONパースエラー: '+e.message);return false;}
    if(!parsed.patients||!Array.isArray(parsed.patients)){alert('無効なデータ形式');return false;}
    const count=parsed.patients.length;
    const open=parsed.patients.reduce((s,p)=>s+(p.tasks||[]).filter(t=>t.status!=='done').length,0);
    if(!window.confirm(`読み込む: 患者${count}人 / 未完タスク${open}件\n現在のデータ(患者${patients.length}人)は上書きされます。続行しますか?`)) return false;
    setPatients(parsed.patients);
    if(parsed.stats?.date===todayStr()) setStats(parsed.stats);
    if(Array.isArray(parsed.templates)) setTemplates(parsed.templates);
    return true;
  };
  const importFromFile = file => {
    if(!file) return;
    const reader=new FileReader();
    reader.onload=e=>{if(runImport(e.target.result)){setImportDialog(false);setImportText('');showToast('インポート完了');}};
    reader.readAsText(file);
  };
  const importFromText = () => { if(runImport(importText)){setImportDialog(false);setImportText('');showToast('インポート完了');} };

  const typeMeta = id => TASK_TYPES.find(t=>t.id===id)||TASK_TYPES[7];
  const estMeta  = id => ESTIMATES.find(e=>e.id===id)||ESTIMATES[1];

  const gasStatusLabel = {ok:'✓',error:'✗',syncing:'…'};
  const gasStatusColor = {ok:{bg:'#D8EDD0',fg:'#336622'},error:{bg:'#EDD0D0',fg:'#882222'},syncing:{bg:'#EDEACC',fg:'#665510'},idle:{bg:'var(--surface-3)',fg:'var(--text-3)'}};
  const gasC = gasStatusColor[gasStatus]||gasStatusColor.idle;

  if (!loaded) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <p style={{color:'var(--text-3)',fontSize:14}}>読み込み中…</p>
    </div>
  );

  return (
    <div style={{minHeight:'100vh',padding:'24px 16px',maxWidth:720,margin:'0 auto'}}>

      {/* ── ヘッダー ── */}
      <header style={{marginBottom:24}}>
        <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',flexWrap:'wrap',gap:12,marginBottom:6}}>
          <div>
            <h1 style={{fontFamily:'var(--font-serif)',fontSize:26,fontWeight:700,color:'var(--text)',margin:0,letterSpacing:'.02em'}}>
              患者さばき
            </h1>
            <p style={{fontSize:11,color:'var(--text-3)',margin:'4px 0 0',letterSpacing:'.02em'}}>
              ※ 患者識別は匿名の符丁で (例: 305-3、A-Tさん、#12)
            </p>
          </div>
          {/* 統計 */}
          <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
            {[
              {label:'受け持ち', val:patients.length,  color:'var(--text)'},
              {label:'未完了',   val:openTaskCount,     color:'var(--text)'},
              {label:'今日の済', val:stats.doneToday,   color:'var(--done)'},
              ...(stuckTasks.length?[{label:'詰まり',val:stuckTasks.length,color:'var(--stuck-fg)'}]:[]),
            ].map(s=>(
              <div key={s.label} style={{
                background:'var(--surface)',border:'1px solid var(--border)',
                borderRadius:20,padding:'4px 12px',display:'flex',alignItems:'baseline',gap:4,
                boxShadow:'var(--shadow-xs)',
              }}>
                <span style={{fontSize:18,fontWeight:700,color:s.color,fontFamily:'var(--font-serif)'}}>{s.val}</span>
                <span style={{fontSize:10,color:'var(--text-3)'}}>{s.label}</span>
              </div>
            ))}
            {gasConfig.url && (
              <span className="gas-badge" style={{background:gasC.bg,color:gasC.fg}}>
                GAS {gasStatusLabel[gasStatus]||'設定済'}
              </span>
            )}
          </div>
        </div>
      </header>

      {/* ── 時限アラート ── */}
      {timedAlerts.length>0&&(
        <div style={{
          marginBottom:16,padding:'12px 14px',borderRadius:12,
          background:'#FDF0E8',border:'1px solid #EDD5C0',
          boxShadow:'var(--shadow-xs)',
        }}>
          <h3 style={{fontSize:12,fontWeight:700,color:'#8A3E20',margin:'0 0 8px',display:'flex',alignItems:'center',gap:6}}>
            <AlertTriangle size={13} color="#8A3E20"/>時限タスク ({timedAlerts.length})
          </h3>
          <ul style={{listStyle:'none',margin:0,padding:0,display:'flex',flexDirection:'column',gap:6}}>
            {timedAlerts.map(t=>{
              const ts=TIME_STATES[t.ts];
              return (
                <li key={t.id} style={{display:'flex',alignItems:'center',gap:8,fontSize:12,color:'#6B4A2F'}}>
                  <span className={`time-tag${t.ts==='past'?' past':''}`} style={{background:ts.bg,color:ts.fg}}>{t.scheduledTime}</span>
                  <span style={{fontFamily:'monospace',fontSize:11,opacity:.6,flexShrink:0}}>{t.patientName}</span>
                  <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.title}</span>
                  <button className="btn-green" onClick={()=>completeTask(t.patientId,t.id)} style={{padding:'3px 10px',fontSize:11,flexShrink:0}}>済</button>
                </li>
              );
            })}
          </ul>
        </div>
      )}

      {/* ── アクションバー ── */}
      <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:16}}>
        <button className="btn-dark" onClick={suggestNext}>
          <Zap size={15}/>次の一手を決めて
        </button>
        <button className={`btn-ghost${quickOnly?' btn-ghost-active':''}`} onClick={()=>setQuickOnly(q=>!q)}>
          <Coffee size={14}/>2分だけ
        </button>
        <button className={`btn-ghost${focusMode?' btn-ghost-active':''}`} onClick={()=>setFocusMode(f=>!f)}>
          <Focus size={14}/>集中モード
        </button>
        {stuckTasks.length>0&&(
          <button className="btn-rose" onClick={suggestFromStuck} style={{marginLeft:'auto'}}>
            <AlertCircle size={13}/>詰まりから1つ
          </button>
        )}
      </div>

      {/* ── 提案カード ── */}
      {suggestion&&(
        <SuggestionCard suggestion={suggestion} typeMeta={typeMeta} estMeta={estMeta} now={now}
          onDone={()=>suggestion.task&&completeTask(suggestion.task.patientId,suggestion.task.id)}
          onDoing={()=>suggestion.task&&updateTask(suggestion.task.patientId,suggestion.task.id,{status:'doing'})}
          onStuck={()=>suggestion.task&&markStuck(suggestion.task.patientId,suggestion.task.id)}
          onReroll={suggestNext} onDismiss={()=>setSuggestion(null)}/>
      )}

      {/* ── 集中モード or 通常リスト ── */}
      {focusMode ? (
        <FocusView patients={sortedPatients} typeMeta={typeMeta} estMeta={estMeta} now={now}
          onComplete={completeTask} onStuck={markStuck}
          onDoing={(pid,tid)=>updateTask(pid,tid,{status:'doing'})} onUnstick={unstick}/>
      ) : (
        <>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {patients.length===0&&(
              <div style={{
                textAlign:'center',padding:'48px 20px',borderRadius:12,
                border:'2px dashed var(--border)',color:'var(--text-3)',fontSize:13,
              }}>
                まずは受け持ちを1人追加してください
              </div>
            )}
            {sortedPatients.map(p=>(
              <PatientCard key={p.id} patient={p} expanded={expandedPatients[p.id]}
                onToggle={()=>toggleExpand(p.id)}
                onRemove={()=>{if(confirm(`「${p.name}」を削除しますか?`))removePatient(p.id);}}
                onSetPriority={pri=>setPatientPriority(p.id,pri)}
                onRename={name=>renamePatient(p.id,name)}
                templates={templates} onApplyTemplate={tpl=>applyTemplate(p.id,tpl)}
                adding={adding[p.id]}
                onStartAdd={()=>setAdding(a=>({...a,[p.id]:true}))}
                onCancelAdd={()=>setAdding(a=>({...a,[p.id]:false}))}
                addForm={addForm[p.id]||{title:'',type:'other',estimate:'5',scheduledTime:''}}
                setAddForm={f=>setAddForm(prev=>({...prev,[p.id]:f}))}
                onAddTask={()=>addTask(p.id)}
                onTaskDone={tid=>completeTask(p.id,tid)} onTaskStuck={tid=>markStuck(p.id,tid)}
                onTaskDoing={tid=>updateTask(p.id,tid,{status:'doing'})} onTaskTodo={tid=>updateTask(p.id,tid,{status:'todo'})}
                onTaskRemove={tid=>removeTask(p.id,tid)} onUnstick={tid=>unstick(p.id,tid)}
                onUpdateTask={(tid,upd)=>updateTask(p.id,tid,upd)}
                typeMeta={typeMeta} estMeta={estMeta} now={now}/>
            ))}
          </div>

          {/* 受け持ち追加 */}
          <div style={{marginTop:12}}>
            <div style={{display:'flex',gap:8,marginBottom:8}}>
              <input value={newPatientName} onChange={e=>setNewPatientName(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&addPatient()}
                placeholder="符丁を入力して Enter (例: 305-3)"
                className="inp"/>
              <button className="btn-ghost" onClick={addPatient} style={{flexShrink:0,padding:'10px 16px'}}>
                <Plus size={15}/>追加
              </button>
            </div>
            <div style={{display:'flex',gap:6,alignItems:'center'}}>
              <span style={{fontSize:11,color:'var(--text-3)'}}>優先度:</span>
              {PRIORITIES.map(pri=>(
                <button key={pri.id} onClick={()=>setNewPatientPri(pri.id)}
                  className="tag" style={{
                    background:newPatientPri===pri.id?pri.color:'transparent',
                    color:newPatientPri===pri.id?'#fff':pri.color,
                    border:`1px solid ${pri.color}60`,cursor:'pointer',fontSize:11,
                    padding:'3px 10px',transition:'all .12s',
                  }}>
                  {pri.label}
                </button>
              ))}
            </div>
          </div>
        </>
      )}

      {/* ── 詰まりリスト ── */}
      {!focusMode&&stuckTasks.length>0&&(
        <div style={{marginTop:20,padding:'14px 16px',borderRadius:12,background:'#FBF4F0',border:'1px solid #EDD5D0',boxShadow:'var(--shadow-xs)'}}>
          <h3 style={{fontSize:12,fontWeight:700,color:'var(--stuck-fg)',margin:'0 0 10px',display:'flex',alignItems:'center',gap:6}}>
            <AlertCircle size={13} color="var(--stuck-fg)"/>詰まってるやつ ({stuckTasks.length})
          </h3>
          <ul style={{listStyle:'none',margin:0,padding:0,display:'flex',flexDirection:'column',gap:8}}>
            {stuckTasks.map(t=>(
              <li key={t.id} style={{display:'flex',alignItems:'flex-start',gap:8,fontSize:12,color:'#6B4040'}}>
                <span style={{fontFamily:'monospace',fontSize:11,opacity:.6,flexShrink:0,marginTop:1}}>{t.patientName}</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:500}}>{t.title}</div>
                  {t.tinyStep&&<div style={{opacity:.7,marginTop:2}}>→ 次の一歩: {t.tinyStep}</div>}
                </div>
                <button className="btn-sm" onClick={()=>unstick(t.patientId,t.id)} style={{flexShrink:0,color:'var(--text-2)'}}>戻す</button>
              </li>
            ))}
          </ul>
        </div>
      )}

      {/* ── データツール ── */}
      <div style={{marginTop:24}}>
        <button className="btn-sm" onClick={()=>setDataToolsOpen(v=>!v)}
          style={{display:'flex',alignItems:'center',gap:4,fontSize:12,color:'var(--text-3)',opacity:.75}}>
          {dataToolsOpen?<ChevronDown size={12}/>:<ChevronRight size={12}/>}
          データ(バックアップ / GAS同期)
        </button>
        {dataToolsOpen&&(
          <div style={{marginTop:8,background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:14,fontSize:12}}>
            {/* GAS */}
            <div style={{background:'var(--surface-2)',borderRadius:8,padding:'10px 12px',marginBottom:12,borderLeft:'3px solid #C4A070'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                <span style={{fontWeight:700,color:'var(--text)',fontSize:12}}>Google Apps Script 同期</span>
                <button className="btn-sm" onClick={()=>setGasDialog(true)} style={{color:'var(--text-2)'}}>
                  {gasConfig.url?'URL変更':'設定する'}
                </button>
              </div>
              {gasConfig.url?(
                <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
                  <button className="btn-ghost" onClick={gasPull} disabled={gasStatus==='syncing'} style={{fontSize:12,padding:'7px 14px'}}>↓ GASから読み込む</button>
                  <button className="btn-dark"  onClick={gasPush} disabled={gasStatus==='syncing'} style={{fontSize:12,padding:'7px 14px'}}>↑ GASに保存する</button>
                  <span style={{fontSize:11,color:'var(--text-3)'}}>変更時3秒後に自動保存</span>
                </div>
              ):(
                <p style={{color:'var(--text-3)',fontSize:12,margin:0}}>設定するとPixel↔Windows間で同期できます。</p>
              )}
            </div>
            {/* 手動 */}
            <p style={{fontWeight:600,color:'var(--text-2)',marginBottom:8}}>手動バックアップ</p>
            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:8}}>
              <button className="btn-ghost" onClick={exportToFile}      style={{fontSize:11,padding:'6px 12px'}}>ファイル保存(.json)</button>
              <button className="btn-ghost" onClick={exportToClipboard} style={{fontSize:11,padding:'6px 12px'}}>クリップボードにコピー</button>
              <button className="btn-ghost" onClick={()=>setImportDialog(true)} style={{fontSize:11,padding:'6px 12px',marginLeft:'auto'}}>インポート…</button>
            </div>
            <p style={{color:'var(--text-3)',fontSize:11,margin:0}}>※ 患者符丁以外の個人情報は入れないこと。</p>
          </div>
        )}
      </div>

      {/* ── テンプレート管理 ── */}
      <div style={{marginTop:8,marginBottom:40}}>
        <button className="btn-sm" onClick={()=>setTemplatesOpen(v=>!v)}
          style={{display:'flex',alignItems:'center',gap:4,fontSize:12,color:'var(--text-3)',opacity:.75}}>
          {templatesOpen?<ChevronDown size={12}/>:<ChevronRight size={12}/>}
          テンプレート管理 ({templates.length})
        </button>
        {templatesOpen&&(
          <TemplatesSection templates={templates} onAddTemplate={addTemplate}
            onUpdateTemplate={updateTemplate} onDeleteTemplate={deleteTemplate}
            onAddItem={addTemplateItem} onUpdateItem={updateTemplateItem} onRemoveItem={removeTemplateItem}/>
        )}
      </div>

      {/* ── ダイアログ ── */}
      {gasDialog&&<GasConfigDialog config={gasConfig} onSave={cfg=>{setGasConfig(cfg);setGasDialog(false);showToast('GAS設定を保存しました');}} onCancel={()=>setGasDialog(false)}/>}
      {stuckDialog&&<StuckDialog form={stuckForm} setForm={setStuckForm} onSave={saveStuck} onCancel={()=>setStuckDialog(null)}/>}
      {importDialog&&<ImportDialog text={importText} setText={setImportText} onImportText={importFromText} onImportFile={importFromFile} onCancel={()=>{setImportDialog(false);setImportText('');}}/>}

      {/* ── トースト ── */}
      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PatientTriage/>);
</script>
</body>
</html>
